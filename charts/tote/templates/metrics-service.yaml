{{- if .Values.serviceMonitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tote.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tote.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  clusterIP: None
  selector:
    {{- include "tote.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  ports:
    - name: metrics
      port: {{ (split ":" .Values.config.metricsAddr)._1 | default 8080 }}
      targetPort: metrics
      protocol: TCP
{{- end }}
