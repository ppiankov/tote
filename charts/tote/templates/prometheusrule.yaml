{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tote.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tote.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: tote
      rules:
        - alert: ToteImagePullFailureDetected
          expr: increase(tote_detected_failures_total[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Image pull failures detected"
            description: "tote detected {{ "{{" }} $value {{ "}}" }} image pull failures in the last 5 minutes."

        - alert: ToteSalvageFailing
          expr: increase(tote_salvage_failures_total[10m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Image salvage operations are failing"
            description: "{{ "{{" }} $value {{ "}}" }} salvage failures in the last 10 minutes. Check agent connectivity and logs."

        - alert: ToteNoSalvageableImages
          expr: increase(tote_not_actionable_total[10m]) > increase(tote_salvageable_images_total[10m])
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Most image failures are not salvageable"
            description: "More failures are not-actionable than salvageable. Consider using digest references instead of tags."

        - alert: ToteNotActionableSpike
          expr: increase(tote_not_actionable_total[5m]) > 3
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Spike in not-actionable image failures"
            description: "{{ "{{" }} $value {{ "}}" }} tag-only images could not be resolved in the last 5 minutes. Check if deployments reference images never pulled to the cluster."

        - alert: ToteNotActionableSustained
          expr: increase(tote_not_actionable_total[30m]) > 10 and increase(tote_salvage_successes_total[30m]) == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Sustained image failures with no successful salvages"
            description: "{{ "{{" }} $value {{ "}}" }} not-actionable failures in 30 minutes with zero salvage successes. Cluster may have lost access to image sources."

        - alert: ToteSalvageOccurred
          expr: increase(tote_salvage_successes_total[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Images salvaged from node cache — fix registry availability"
            description: "{{ "{{" }} $value {{ "}}" }} images were salvaged in the last 15 minutes. Salvage means the image was not pullable from its registry but was found cached on another node. Push missing images to the registry to prevent data loss if the source node is drained."

        - alert: ToteControllerDown
          expr: up{job=~".*tote.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "tote controller is down"
            description: "Prometheus cannot scrape the tote controller metrics endpoint."
{{- end }}
